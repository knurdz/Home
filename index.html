<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knurdz - Coming Soon</title>
    <meta name="description" content="Something amazing is in the works. Knurdz is coming soon.">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link href="./dist/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <!-- Placeholder for icons if needed -->
</head>

<body class="bg-gray-950 font-['Outfit',sans-serif] min-h-screen text-white overflow-hidden relative">

    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600/30 rounded-full blur-[128px] animate-pulse">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/30 rounded-full blur-[128px] animate-pulse"
            style="animation-delay: 2s;"></div>
    </div>

    <main class="flex flex-col items-center justify-center min-h-screen px-4 py-12 relative z-10 text-center">

        <!-- Logo / Icon -->
        <div class="mb-8 p-4 bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl shadow-2xl">
            <img src="./favicon.png" alt="Knurdz Logo" class="w-16 h-16 object-contain">
        </div>

        <!-- Main Content -->
        <div class="max-w-2xl mx-auto space-y-6">
            <h1
                class="text-5xl md:text-7xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-blue-400 to-cyan-400 drop-shadow-sm">
                Knurdz
            </h1>
            <p class="text-xl md:text-2xl text-gray-300 font-light max-w-lg mx-auto leading-relaxed">
                We are building something extraordinary for the <span
                    class="text-purple-300 font-medium">obsessed</span>, the <span
                    class="text-blue-300 font-medium">passionate</span>, and the <span
                    class="text-cyan-300 font-medium">curious</span>.
            </p>

            <div class="py-8">
                <div
                    class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-sm font-medium text-blue-200 animate-bounce">
                    <span class="w-2 h-2 rounded-full bg-green-400"></span>
                    Launching soon
                </div>
            </div>


        </div>

        <!-- Footer -->
        <footer class="absolute bottom-6 w-full text-center text-gray-600 text-sm">
            &copy;
            <script>document.write(new Date().getFullYear())</script> Knurdz. All rights reserved.
        </footer>
    </main>


</body>

</html>
