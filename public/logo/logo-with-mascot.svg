<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      .logo-text { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 46px; letter-spacing: -2px; }
      .k      { fill: #ffffff; }
      .nurdz  { fill: #6b7280; }
      .usc    { fill: #22c55e; }
      .bg     { fill: #000000; }
      .accent { fill: #22c55e; }
      .gray   { fill: #27272a; }
      
      @media (prefers-color-scheme: light) {
        .k    { fill: #000000; }
        .bg   { fill: #ffffff; }
        .gray { fill: #e5e7eb; }
      }
    </style>
  </defs>

  <g transform="translate(0, 0)">
    <!-- Base -->
    <path d="M40 10 C20 10 15 25 15 45 C15 65 25 75 40 75 C55 75 65 65 65 45 C65 25 60 10 40 10 Z" class="gray" />
    
    <!-- Ears -->
    <path d="M25 15 L15 25 L25 35 Z" class="gray" />
    <path d="M55 15 L65 25 L55 35 Z" class="gray" />

    <!-- Inner Face -->
    <path d="M40 25 C25 25 20 35 20 45 C20 55 30 65 40 65 C50 65 60 55 60 45 C60 35 55 25 40 25 Z" class="bg" />

    <!-- Eyes -->
    <circle cx="30" cy="40" r="6" class="accent" />
    <circle cx="50" cy="40" r="6" class="accent" />
    <rect x="29" y="37" width="2" height="6" class="bg" />
    <rect x="49" y="37" width="2" height="6" class="bg" />

    <!-- Beak -->
    <path d="M37 48 L43 48 L40 55 Z" class="accent" />

    <!-- Wing lines -->
    <path d="M18 40 Q25 55 20 70" fill="none" stroke-width="2" class="bg" />
    <path d="M62 40 Q55 55 60 70" fill="none" stroke-width="2" class="bg" />

    <!-- Prompt -->
    <text x="35" y="20" font-family="monospace" font-size="8" font-weight="bold" class="accent">&gt;_</text>
  </g>

  <!-- Divider -->
  <line x1="85" y1="16" x2="85" y2="64" stroke="#22c55e" stroke-width="2" opacity="0.3" />

  <!-- Text -->
  <text x="100" y="57" dominant-baseline="auto" class="logo-text">
    <tspan class="k">K</tspan><tspan class="nurdz">nurdz</tspan><tspan class="usc">_</tspan>
  </text>
</svg>
